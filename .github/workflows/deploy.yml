name: АчааЗам — GitHub Pages Deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_FIREBASE_API_KEY: "AIzaSyBxJftXyMZqWoOdbuFxFx2R-5FHdNHrAVE"
          VITE_FIREBASE_AUTH_DOMAIN: "hurgelt-15371.firebaseapp.com"
          VITE_FIREBASE_PROJECT_ID: "hurgelt-15371"
          VITE_FIREBASE_STORAGE_BUCKET: "hurgelt-15371.firebasestorage.app"
          VITE_FIREBASE_MESSAGING_SENDER_ID: "368823660689"
          VITE_FIREBASE_APP_ID: "1:368823660689:web:2723d651ba10c7d1f7cf30"
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4